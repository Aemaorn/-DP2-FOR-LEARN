services:
  frontend:
    container_name: dp2-frontend
    image: ghbrepo.azurecr.io/ghb-dp2-frontend:latest
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
  
  backend:
    container_name: dp2-api
    image: ghbrepo.azurecr.io/ghb-dp2-api:latest
    build:
      context: ./Backend
      dockerfile: ./GHB.DP2.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=GHB.DP2;User Id=postgres;Password=postgres;"
      FileService__ServiceUrl: "https://file-service.ch-core.staging.codehard.co.th"
      FileService__TenantId: "631a4d99-c00c-43b7-a805-a310dd5f5c82"
      FileService__ApiKey: "fs_chcorefileStaging_TVGb87sZB5RHcqJr2aMFgXt4U3"
      ActiveDirectory__Server: "127.0.0.1"
      ActiveDirectory__Port: "389"
      ActiveDirectory__DomainName: "example.com"
      ActiveDirectory__BaseDn: "dc=example,dc=com"
      Jwt__Secret: "JPFXD2IXdYXC5HkMI1ZWpUOrvfQLo8zeWWzLUvSodlA="
      Jwt__AccessTokenValidity: "3600000"
      Jwt__RefreshTokenValidity: "604800000"
    depends_on:
      - postgres
  
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - "./postgresql:/var/lib/postgresql/data"