server {
    # Security: hide nginx version and signatures
    server_tokens off;
    # ปิด signature ใน error page และซ่อน X-Powered-By จาก upstream
    proxy_hide_header X-Powered-By;
    fastcgi_hide_header X-Powered-By;
    listen 80;
    http2 on; # Enable HTTP/2
    server_name _;

    # Central allowlist for external embed/form origins (space-separated). Maintain here only.
    # Name kept generic to support multiple providers (e.g., office viewers, BI, etc.)
    set $embed_origins "https://ghb-dp2.staging.codehard.co.th https://api.ghb-dp2.staging.codehard.co.th https://cheditor2.staging.codehard.co.th https://ghbdp.ghb.co.th https://ghbdp-uat2.ghb.co.th https://ghbdp-uat.ghb.co.th https://ghbdp-cheditor.ghb.co.th https://ghbdp-cheditoruat2.ghb.co.th https://ghbdp-cheditoruat.ghb.co.th https://ghbdp-exapi.ghb.co.th https://ghbdp-exapiuat2.ghb.co.th https://ghbdp-exapiuat.ghb.co.th https://ghbdp-inapi.ghb.co.th https://ghbdp-inapiuat2.ghb.co.th https://ghbdp-inapiuat.ghb.co.th";

    # Content Security Policy: strict by default, allow only required external origins.
    # Keep single-line to avoid proxy parse issues. Append upgrade-insecure-requests only on HTTPS.
    set $csp_upgrade "";
    if ($scheme = https) { set $csp_upgrade " upgrade-insecure-requests"; }
    add_header Content-Security-Policy "default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; frame-src 'self' $embed_origins; child-src 'self' $embed_origins; form-action 'self' $embed_origins; frame-ancestors 'self';$csp_upgrade" always;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    ssl_protocols TLSv1.2 TLSv1.3;

    # TLS 1.2 ciphers
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;

    # TLS 1.3 ciphers
    # ssl_ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;

    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options "nosniff" always;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
      # CSRF token verification
      if ($request_method !~ ^(GET|HEAD|POST)$) {
          return 405;
      }

      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;
    }

    # Block access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Additional HTTP headers for improved security
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";

    # Cache-control headers
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 30d;
        add_header Pragma public;
        add_header Cache-Control "public";

        root   /usr/share/nginx/html;
    }

    # Redirect all 403 Forbidden responses to SPA route /forbidden
    # Using =302 issues a redirect so the browser navigates to the route
    # handled by the frontend (instead of serving an error page with 403).
    error_page 403 =302 /forbidden;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
